<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>鲨鱼之王</title>
    <meta
      name="viewport"
      content="width=device-width,user-scalable=no,initial-scale=1, minimum-scale=1,maximum-scale=1"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="format-detection" content="telephone=no" />

    <!-- force webkit on 360 -->
    <meta name="renderer" content="webkit" />
    <meta name="force-rendering" content="webkit" />
    <!-- force edge on IE -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- force full screen on some browser -->
    <meta name="full-screen" content="yes" />
    <meta name="x5-fullscreen" content="true" />
    <meta name="360-fullscreen" content="true" />

    <!-- force screen orientation on some browser -->
    <meta name="screen-orientation" content="portrait" />
    <meta name="x5-orientation" content="portrait" />

    <!--fix fireball/issues/3568 -->
    <!--<meta name="browsermode" content="application">-->
    <meta name="x5-page-mode" content="app" />

    <!--<link rel="apple-touch-icon" href=".png" />-->
    <!--<link rel="apple-touch-icon-precomposed" href=".png" />-->

    <link rel="stylesheet" type="text/css" href="style-mobile.1777a.css" />
    <link rel="icon" href="favicon.8de18.ico" />
  </head>
  <body>
    <canvas
      id="GameCanvas"
      oncontextmenu="event.preventDefault()"
      tabindex="0"
    ></canvas>
    <div id="splash">
      <div class="progress-bar stripes">
        <span style="width: 0%"></span>
      </div>
    </div>

    <script src="patch.js" charset="utf-8"></script>
    <script src="src/settings.js" charset="utf-8"></script>
    <script src="game-defines.a175e.js" charset="utf-8"></script>
    <script src="main.2a00e.js" charset="utf-8"></script>
    <script src="cocos2d-js-min.a5841.js" charset="utf-8"></script>
    <!-- 初始化脚本，确保unsafeWindow和sheetjs库可用 - 必须在用户脚本之前加载 -->
    <script type="text/javascript">
      // 确保sheetjs库已加载
      if (typeof XLSX === 'undefined') {
          var script = document.createElement('script');
          script.src = 'https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js';
          script.async = false;
          document.head.appendChild(script);
      }
      
      // 为本地运行环境创建unsafeWindow对象
      var unsafeWindow = window;
      
      // 模拟Tampermonkey API
      if (typeof GM_addStyle === 'undefined') {
          window.GM_addStyle = function(css) {
              var style = document.createElement('style');
              style.type = 'text/css';
              style.textContent = css;
              document.head.appendChild(style);
          };
      }
      
      if (typeof GM_xmlhttpRequest === 'undefined') {
          window.GM_xmlhttpRequest = function(options) {
              return fetch(options.url, {
                  method: options.method || 'GET',
                  headers: options.headers,
                  body: options.data,
                  credentials: 'include'
              })
              .then(response => {
                  let responseText = '';
                  return response.text().then(text => {
                      responseText = text;
                      return {
                          status: response.status,
                          statusText: response.statusText,
                          responseText: responseText,
                          responseHeaders: response.headers
                      };
                  });
              })
              .then(response => {
                  if (options.onload) {
                      options.onload(response);
                  }
              })
              .catch(error => {
                  if (options.onerror) {
                      options.onerror({ error: error.message });
                  }
              });
          };
      }
    </script>
    <!-- 自动添加的JS插件引用 -->
    <script src="7.7.12.js" charset="utf-8"></script>
    <script src="4.1.1.js" charset="utf-8"></script>
    <script type="text/javascript">
      (function () {
        // 隐藏包含 #close 和 #open 子元素的 div（替代 CSS :has 选择器）
        function hideAdContainer() {
          var divs = document.getElementsByTagName('div');
          for (var i = 0; i < divs.length; i++) {
            var div = divs[i];
            var hasClose = div.querySelector('#close');
            var hasOpen = div.querySelector('#open');
            if (hasClose && hasOpen) {
              div.style.display = 'none !important';
            }
          }
        }
        // 页面加载完成后执行
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', hideAdContainer);
        } else {
          hideAdContainer();
        }
        // 同时监听动态添加的元素
        setInterval(hideAdContainer, 1000);

        window.HtmlIsLoaded = true;
        var splash = document.getElementById("splash");
        splash.style.display = "none";
        window.boot();
      })();
    </script>
  </body>
</html>
